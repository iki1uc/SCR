<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>OPTA В· 6EвҶ’6D В· ROOMвҖ‘Engine В· v2.0</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:30px; }
h1 { color:#6cf; margin-bottom:25px; }

.grid {
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:20px;
}

.block {
    background:#111;
    border:1px solid #333;
    padding:20px;
    border-radius:8px;
}

.block h2 {
    color:#6cf;
    margin-bottom:10px;
}

pre {
    background:#000;
    border-left:3px solid #6cf;
    padding:15px;
    white-space:pre-wrap;
    margin-top:10px;
}

.segment { color:#4cf; font-size:12px; margin-top:5px; }

/* Mini-Diagramme */
.diagram {
    background:#000;
    border:1px solid #333;
    padding:10px;
    margin-top:10px;
    font-size:12px;
    white-space:pre;
    color:#6cf;
}
</style>
</head>

<body>

<h1>OPTA В· 6EвҶ’6D В· ROOMвҖ‘EngineвҖ‘Index В· v2.0</h1>

<div class="grid" id="grid"></div>

<script>
// Achsen вҶ’ Alias вҶ’ ROOM-Datei
const axes = {
    "T": { alias: "A", room: "T.room" },
    "U": { alias: "W", room: "U.room" },
    "H": { alias: "Q", room: "H.room" },
    "B": { alias: "S", room: "B.room" },
    "Y": { alias: "V", room: "Y.room" },
    "Z": { alias: "X", room: "Z.room" }
};

// ROOM-Datei laden
async function loadRoom(axis, roomFile) {
    try {
        const res = await fetch(axis + "/" + roomFile);
        if (!res.ok) return "ROOM-Datei nicht gefunden.";
        return await res.text();
    } catch {
        return "ROOM konnte nicht geladen werden.";
    }
}

// Mini-Diagramme
function axisDiagram(axis) {
    return `
Achse: ${axis}
в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
в”Ӯ IN  вҶ’  CORE вҶ’ OUT в”Ӯ
в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
`;
}

function optaDiagram() {
    return `
OPTAВІ (8)
в—Ҹв”Җв”Җв—Ҹв”Җв”Җв—Ҹв”Җв”Җв—Ҹ
в—Ҹв”Җв”Җв—Ҹв”Җв”Җв—Ҹв”Җв”Җв—Ҹ

OPTAВі (24)
в—Үв—Үв—Үв—Үв—Үв—Үв—Үв—Ү
в—Үв—Үв—Үв—Үв—Үв—Үв—Үв—Ү
в—Үв—Үв—Үв—Үв—Үв—Үв—Үв—Ү
`;
}

function nc2Diagram() {
    return `
NCВІ-Matrix
[в–Ў]в”Җ[в–Ў]в”Җ[в–Ў]
 в”Ӯ   в”Ӯ   в”Ӯ
[в–Ў]в”Җ[в–Ў]в”Җ[в–Ў]
 в”Ӯ   в”Ӯ   в”Ӯ
[в–Ў]в”Җ[в–Ў]в”Җ[в–Ў]
`;
}

async function buildGrid() {
    const grid = document.getElementById("grid");

    for (const axis of Object.keys(axes)) {
        const data = axes[axis];
        const roomContent = await loadRoom(axis, data.room);

        const block = document.createElement("div");
        block.className = "block";

        block.innerHTML = `
            <h2>${data.alias} В· Achse ${axis}</h2>
            <div class="segment">ROOM: ${data.room}</div>

            <div class="diagram">${axisDiagram(axis)}</div>
            <div class="diagram">${optaDiagram()}</div>
            <div class="diagram">${nc2Diagram()}</div>

            <pre>${roomContent}</pre>
        `;

        grid.appendChild(block);
    }
}

buildGrid();
</script>

</body>
</html>
